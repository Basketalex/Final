<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Math Quiz</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 class="title">IB Math Quiz</h1>

        <div class="top-bar">

            <div class="score-box">
                Puntaje: <span id="score">0</span>
            </div>

            <div class="timer-box">
                Tiempo: <span id="timer">30</span>s
            </div>

        </div>

        <div class="question-box">

            <h2 id="question">
                5 + 5
            </h2>

        </div>

        <div class="answer-box">

            <input 
                type="number" 
                id="answer-input"
                placeholder="Tu respuesta"
            >

            <button id="submit-btn">
                Responder
            </button>

        </div>

        <div id="message">

        </div>

        <button id="restart-btn">
            Reiniciar Juego
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
